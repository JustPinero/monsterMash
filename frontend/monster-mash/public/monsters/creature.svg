<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Water ripples at bottom -->
  <ellipse cx="150" cy="340" rx="120" ry="8" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <ellipse cx="150" cy="335" rx="100" ry="6" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.2"/>
  <ellipse cx="150" cy="330" rx="80" ry="5" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.15"/>
  <!-- Head crest/fin -->
  <path d="M150 35 Q140 40 130 55 L120 70 L150 50 L180 70 L170 55 Q160 40 150 35" fill="#cc0000" opacity="0.6"/>
  <!-- Head -->
  <path d="M110 70 Q105 80 105 110 Q108 150 130 165 Q140 170 150 172 Q160 170 170 165 Q192 150 195 110 Q195 80 190 70 Q175 55 150 52 Q125 55 110 70" fill="#cc0000" opacity="0.45"/>
