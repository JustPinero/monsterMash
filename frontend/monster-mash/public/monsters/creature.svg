  <path d="M115 85 Q150 75 185 85" stroke="#cc0000" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Large round eyes -->
  <circle cx="130" cy="105" r="12" fill="#1a1c17"/>
  <circle cx="170" cy="105" r="12" fill="#1a1c17"/>
  <circle cx="130" cy="105" r="8" fill="#e8e0d0" opacity="0.6"/>
  <circle cx="170" cy="105" r="8" fill="#e8e0d0" opacity="0.6"/>
  <circle cx="130" cy="105" r="4" fill="#1a1c17"/>
  <circle cx="170" cy="105" r="4" fill="#1a1c17"/>
  <!-- Gill slits -->
  <line x1="100" y1="120" x2="90" y2="130" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <line x1="98" y1="130" x2="88" y2="140" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="140" x2="86" y2="150" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="120" x2="210" y2="130" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <line x1="202" y1="130" x2="212" y2="140" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <line x1="204" y1="140" x2="214" y2="150" stroke="#cc0000" stroke-width="2" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M125 150 Q150 160 175 150" stroke="#1a1c17" stroke-width="2" fill="none"/>
  <!-- Scaly body -->
  <path d="M110 175 Q95 220 90 280 Q90 320 110 340 L190 340 Q210 320 210 280 Q205 220 190 175 Z" fill="#cc0000" opacity="0.35"/>
  <!-- Scale texture -->
  <path d="M120 200 Q130 195 140 200 Q130 205 120 200" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M150 195 Q160 190 170 195 Q160 200 150 195" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M135 220 Q145 215 155 220 Q145 225 135 220" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M160 218 Q170 213 180 218 Q170 223 160 218" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M115 215 Q125 210 135 215 Q125 220 115 215" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Webbed hands -->
  <path d="M80 230 L60 240 L55 235 M60 240 L52 245 M60 240 L58 250" stroke="#cc0000" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M55 235 Q50 242 52 245 Q48 248 58 250" fill="#cc0000" opacity="0.2"/>
  <path d="M220 230 L240 240 L245 235 M240 240 L248 245 M240 240 L242 250" stroke="#cc0000" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M245 235 Q250 242 248 245 Q252 248 242 250" fill="#cc0000" opacity="0.2"/>
  <!-- Bubbles -->
  <circle cx="60" cy="300" r="3" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <circle cx="70" cy="285" r="2" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.25"/>
  <circle cx="55" cy="310" r="4" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.2"/>
  <text x="150" y="380" text-anchor="middle" fill="#61dafb" font-family="serif" font-size="18" letter-spacing="2">CREATURE</text>
</svg>