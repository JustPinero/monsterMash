<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Elongated head -->
  <path d="M150 30 Q170 30 180 60 Q185 90 180 130 Q175 140 165 145 L135 145 Q125 140 120 130 Q115 90 120 60 Q130 30 150 30" fill="#e8e0d0" opacity="0.6"/>
  <!-- Head ridges -->
  <line x1="130" y1="40" x2="130" y2="80" stroke="#1a1c17" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="35" x2="140" y2="85" stroke="#1a1c17" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="32" x2="150" y2="88" stroke="#1a1c17" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="35" x2="160" y2="85" stroke="#1a1c17" stroke-width="1.5" opacity="0.5"/>
  <line x1="170" y1="40" x2="170" y2="80" stroke="#1a1c17" stroke-width="1.5" opacity="0.5"/>
  <!-- No visible eyes - smooth head -->
  <!-- Inner mouth area -->
  <path d="M135 130 Q150 125 165 130 Q165 142 150 145 Q135 142 135 130" fill="#1a1c17"/>
  <!-- Teeth -->
  <line x1="138" y1="130" x2="140" y2="137" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="145" y1="128" x2="146" y2="137" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="152" y1="128" x2="152" y2="137" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="158" y1="128" x2="157" y2="137" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="163" y1="130" x2="161" y2="137" stroke="#e8e0d0" stroke-width="1.5"/>
  <!-- Inner jaw -->
  <rect x="144" y="136" width="12" height="8" rx="3" fill="#cc0000" opacity="0.7"/>
  <!-- Neck -->
  <rect x="138" y="145" width="24" height="20" rx="3" fill="#e8e0d0" opacity="0.4"/>
  <!-- Ribbed body -->
  <path d="M120 165 Q110 200 105 270 Q105 300 120 310 L180 310 Q195 300 195 270 Q190 200 180 165 Z" fill="#e8e0d0" opacity="0.3"/>
  <!-- Body ribs -->
  <path d="M120 185 Q150 180 180 185" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M118 205 Q150 200 182 205" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M115 225 Q150 220 185 225" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M113 245 Q150 240 187 245" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M112 265 Q150 260 188 265" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Tail -->
  <path d="M150 310 Q130 330 100 340 Q80 345 60 335 L55 340" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Tail blade -->
  <polygon points="55,340 40,330 45,345 35,350" fill="#e8e0d0" opacity="0.6"/>
  <!-- Arms/claws -->
  <path d="M120 180 L80 210 L75 205 M80 210 L72 215 M80 210 L78 220" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M180 180 L220 210 L225 205 M220 210 L228 215 M220 210 L222 220" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Drool -->
  <line x1="148" y1="145" x2="146" y2="162" stroke="#61dafb" stroke-width="1" opacity="0.4"/>
  <text x="150" y="380" text-anchor="middle" fill="#61dafb" font-family="monospace" font-size="16" letter-spacing="2">XENOMORPH</text>
</svg>