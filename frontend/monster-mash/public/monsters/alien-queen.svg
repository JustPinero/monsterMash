<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Massive crown/crest -->
  <path d="M150 130 L60 40 Q55 35 58 50 L90 120 Z" fill="#e8e0d0" opacity="0.4"/>
  <path d="M150 130 L240 40 Q245 35 242 50 L210 120 Z" fill="#e8e0d0" opacity="0.4"/>
  <path d="M150 130 L100 50 Q98 45 102 55 L120 120 Z" fill="#e8e0d0" opacity="0.35"/>
  <path d="M150 130 L200 50 Q202 45 198 55 L180 120 Z" fill="#e8e0d0" opacity="0.35"/>
  <path d="M150 130 L150 30 Q148 25 152 25 L152 120 Z" fill="#e8e0d0" opacity="0.3"/>
  <!-- Crown ridges -->
  <path d="M80 80 Q115 100 150 90 Q185 100 220 80" stroke="#e8e0d0" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Head -->
  <path d="M120 130 Q115 140 118 170 Q125 185 150 190 Q175 185 182 170 Q185 140 180 130 Q165 120 150 118 Q135 120 120 130" fill="#e8e0d0" opacity="0.5"/>
  <!-- Head ridges -->
  <line x1="130" y1="125" x2="130" y2="160" stroke="#1a1c17" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="122" x2="140" y2="165" stroke="#1a1c17" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="120" x2="150" y2="168" stroke="#1a1c17" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="122" x2="160" y2="165" stroke="#1a1c17" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="125" x2="170" y2="160" stroke="#1a1c17" stroke-width="1.5" opacity="0.4"/>
  <!-- Mouth - inner jaw -->
  <path d="M130 170 Q150 165 170 170 Q170 185 150 188 Q130 185 130 170" fill="#1a1c17"/>
  <!-- Teeth -->
  <line x1="135" y1="170" x2="137" y2="178" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="142" y1="168" x2="143" y2="178" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="149" y1="167" x2="150" y2="178" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="156" y1="168" x2="155" y2="178" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="163" y1="170" x2="161" y2="178" stroke="#e8e0d0" stroke-width="1.5"/>
  <!-- Inner jaw -->
  <rect x="143" y="177" width="14" height="8" rx="4" fill="#cc0000" opacity="0.6"/>
  <!-- Ribbed body/torso -->
  <path d="M115 195 Q105 230 100 280 L200 280 Q195 230 185 195 Z" fill="#e8e0d0" opacity="0.25"/>
  <!-- Body ribs -->
  <path d="M115 210 Q150 205 185 210" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M112 230 Q150 225 188 230" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M108 250 Q150 245 192 250" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M105 270 Q150 265 195 270" stroke="#e8e0d0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Four arms -->
  <path d="M115 210 L75 230 L65 225 M75 230 L60 235" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M185 210 L225 230 L235 225 M225 230 L240 235" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M110 240 L80 255 L72 250" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M190 240 L220 255 L228 250" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Tail -->
  <path d="M150 280 Q140 310 110 330 Q80 340 60 335 L50 340" stroke="#e8e0d0" stroke-width="4" fill="none" opacity="0.4"/>
  <polygon points="50,340 35,328 40,345 28,350" fill="#e8e0d0" opacity="0.5"/>
  <!-- Eggs at base -->
  <ellipse cx="200" cy="335" rx="12" ry="18" fill="#cc0000" opacity="0.2"/>
  <ellipse cx="230" cy="340" rx="10" ry="15" fill="#cc0000" opacity="0.15"/>
  <ellipse cx="255" cy="338" rx="11" ry="16" fill="#cc0000" opacity="0.18"/>
  <!-- Acid drool -->
  <line x1="148" y1="188" x2="146" y2="200" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <text x="150" y="380" text-anchor="middle" fill="#61dafb" font-family="monospace" font-size="16" letter-spacing="2">ALIEN QUEEN</text>
</svg>