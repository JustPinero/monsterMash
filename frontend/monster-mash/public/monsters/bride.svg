<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Tall beehive hair -->
  <path d="M110 120 Q110 20 150 15 Q190 20 190 120" fill="#e8e0d0" opacity="0.7"/>
  <!-- White streak in hair -->
  <path d="M140 15 Q142 70 138 120" stroke="#e8e0d0" stroke-width="6" fill="none"/>
  <path d="M160 15 Q158 70 162 120" stroke="#e8e0d0" stroke-width="6" fill="none"/>
  <!-- Face -->
  <ellipse cx="150" cy="140" rx="35" ry="40" fill="#e8e0d0" opacity="0.5"/>
  <!-- Stitches on face -->
  <line x1="115" y1="135" x2="130" y2="135" stroke="#cc0000" stroke-width="2"/>
  <line x1="120" y1="131" x2="120" y2="139" stroke="#cc0000" stroke-width="1.5"/>
  <line x1="125" y1="131" x2="125" y2="139" stroke="#cc0000" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="138" cy="132" rx="5" ry="6" fill="#1a1c17"/>
  <ellipse cx="162" cy="132" rx="5" ry="6" fill="#1a1c17"/>
  <circle cx="138" cy="132" r="2.5" fill="#cc0000"/>
  <circle cx="162" cy="132" r="2.5" fill="#cc0000"/>
  <!-- Lips -->
  <path d="M140 158 Q150 166 160 158" fill="#cc0000"/>
  <!-- Neck bolts -->
  <rect x="108" y="170" width="10" height="6" rx="3" fill="#cc0000" opacity="0.8"/>
  <rect x="182" y="170" width="10" height="6" rx="3" fill="#cc0000" opacity="0.8"/>
  <!-- Neck -->
  <rect x="135" y="175" width="30" height="20" fill="#e8e0d0" opacity="0.4"/>
  <!-- Dress/body -->
  <path d="M120 195 L100 320 L200 320 L180 195 Z" fill="#e8e0d0" opacity="0.3"/>
  <!-- Bandage wrapping -->
  <line x1="110" y1="220" x2="190" y2="230" stroke="#e8e0d0" stroke-width="2" opacity="0.5"/>
  <line x1="105" y1="250" x2="195" y2="260" stroke="#e8e0d0" stroke-width="2" opacity="0.5"/>
  <line x1="103" y1="280" x2="197" y2="290" stroke="#e8e0d0" stroke-width="2" opacity="0.5"/>
  <text x="150" y="380" text-anchor="middle" fill="#e8e0d0" font-family="serif" font-size="14" letter-spacing="2">BRIDE OF FRANKENSTEIN</text>
</svg>