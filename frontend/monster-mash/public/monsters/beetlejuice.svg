<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Wild messy hair -->
  <path d="M90 100 Q80 60 100 40 Q110 30 120 45 Q115 25 135 30 Q140 20 155 30 Q165 20 175 35 Q185 25 190 45 Q200 30 210 50 Q220 60 210 100" fill="#e8e0d0" opacity="0.5"/>
  <path d="M85 100 Q75 70 95 50" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M215 100 Q225 70 205 50" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Face -->
  <ellipse cx="150" cy="130" rx="50" ry="50" fill="#e8e0d0" opacity="0.6"/>
  <!-- Dark circles around eyes -->
  <circle cx="130" cy="120" r="15" fill="#1a1c17" opacity="0.6"/>
  <circle cx="170" cy="120" r="15" fill="#1a1c17" opacity="0.6"/>
  <!-- Eyes - wild -->
  <ellipse cx="130" cy="120" rx="8" ry="7" fill="#e8e0d0"/>
  <circle cx="132" cy="119" r="4" fill="#1a1c17"/>
  <circle cx="132" cy="119" r="2" fill="#cc0000" opacity="0.5"/>
  <ellipse cx="170" cy="120" rx="8" ry="7" fill="#e8e0d0"/>
  <circle cx="168" cy="119" r="4" fill="#1a1c17"/>
  <circle cx="168" cy="119" r="2" fill="#cc0000" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="150" cy="138" rx="5" ry="4" fill="#e8e0d0" opacity="0.8"/>
  <!-- Big crazy grin -->
  <path d="M115 155 Q130 175 150 178 Q170 175 185 155" stroke="#1a1c17" stroke-width="3" fill="#1a1c17"/>
  <!-- Teeth -->
  <rect x="125" y="157" width="7" height="8" fill="#e8e0d0" opacity="0.8"/>
  <rect x="134" y="156" width="7" height="10" fill="#e8e0d0" opacity="0.7"/>
  <rect x="143" y="155" width="7" height="11" fill="#e8e0d0" opacity="0.9"/>
  <rect x="152" y="155" width="7" height="11" fill="#e8e0d0" opacity="0.7"/>
  <rect x="161" y="156" width="7" height="10" fill="#e8e0d0" opacity="0.8"/>
  <rect x="170" y="157" width="7" height="8" fill="#e8e0d0" opacity="0.7"/>
  <!-- Mold/moss spots on face -->
  <circle cx="115" cy="135" r="4" fill="#cc0000" opacity="0.3"/>
  <circle cx="185" cy="125" r="3" fill="#cc0000" opacity="0.3"/>
  <!-- Black and white striped suit -->
  <rect x="100" y="195" width="100" height="140" rx="5" fill="#e8e0d0" opacity="0.4"/>
  <rect x="100" y="195" width="10" height="140" fill="#1a1c17"/>
  <rect x="120" y="195" width="10" height="140" fill="#1a1c17"/>
  <rect x="140" y="195" width="10" height="140" fill="#1a1c17"/>
  <rect x="160" y="195" width="10" height="140" fill="#1a1c17"/>
  <rect x="180" y="195" width="10" height="140" fill="#1a1c17"/>
  <!-- Lapels -->
  <path d="M120 195 L150 220 L180 195" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.5"/>
  <text x="150" y="380" text-anchor="middle" fill="#e8e0d0" font-family="serif" font-size="16" letter-spacing="2">BEETLEJUICE</text>
</svg>