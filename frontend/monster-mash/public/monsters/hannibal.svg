<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Head -->
  <ellipse cx="150" cy="110" rx="45" ry="55" fill="#e8e0d0" opacity="0.5"/>
  <!-- Slicked back hair -->
  <path d="M105 85 Q110 55 150 45 Q190 55 195 85" fill="#1a1c17" stroke="#e8e0d0" stroke-width="1"/>
  <path d="M108 85 Q115 60 150 50 Q185 60 192 85" fill="#e8e0d0" opacity="0.2"/>
  <!-- Calm, intelligent eyes -->
  <ellipse cx="132" cy="100" rx="8" ry="5" fill="#e8e0d0" opacity="0.8"/>
  <circle cx="132" cy="100" r="3.5" fill="#1a1c17"/>
  <circle cx="133" cy="99" r="1.5" fill="#cc0000"/>
  <ellipse cx="168" cy="100" rx="8" ry="5" fill="#e8e0d0" opacity="0.8"/>
  <circle cx="168" cy="100" r="3.5" fill="#1a1c17"/>
  <circle cx="169" cy="99" r="1.5" fill="#cc0000"/>
  <!-- Nose -->
  <path d="M148 108 L145 122 L150 124 L155 122 L152 108" stroke="#e8e0d0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- THE MASK - iconic muzzle -->
  <path d="M110 115 Q108 130 110 155 Q120 170 150 175 Q180 170 190 155 Q192 130 190 115" fill="none" stroke="#e8e0d0" stroke-width="2.5"/>
  <!-- Mask cage bars - vertical -->
  <line x1="125" y1="118" x2="125" y2="170" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="140" y1="116" x2="140" y2="173" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="150" y1="115" x2="150" y2="175" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="160" y1="116" x2="160" y2="173" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="175" y1="118" x2="175" y2="170" stroke="#e8e0d0" stroke-width="2"/>
  <!-- Mask cage bars - horizontal -->
  <path d="M110 130 Q150 125 190 130" stroke="#e8e0d0" stroke-width="2" fill="none"/>
  <path d="M112 148 Q150 143 188 148" stroke="#e8e0d0" stroke-width="2" fill="none"/>
  <!-- Mask straps -->
  <line x1="110" y1="125" x2="90" y2="120" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="190" y1="125" x2="210" y2="120" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="108" y1="145" x2="88" y2="148" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="192" y1="145" x2="212" y2="148" stroke="#e8e0d0" stroke-width="2"/>
  <!-- Jumpsuit -->
  <rect x="105" y="185" width="90" height="140" rx="5" fill="#e8e0d0" opacity="0.1"/>
  <line x1="150" y1="185" x2="150" y2="325" stroke="#e8e0d0" stroke-width="0.8" opacity="0.15"/>
  <!-- Restraint straps on body -->
  <rect x="100" y="220" width="100" height="8" rx="3" fill="#cc0000" opacity="0.3"/>
  <rect x="100" y="260" width="100" height="8" rx="3" fill="#cc0000" opacity="0.3"/>
  <!-- Buckles -->
  <rect x="145" y="218" width="10" height="12" rx="1" fill="#e8e0d0" opacity="0.5"/>
  <rect x="145" y="258" width="10" height="12" rx="1" fill="#e8e0d0" opacity="0.5"/>
  <!-- Hands restrained -->
  <rect x="115" y="290" width="70" height="15" rx="5" fill="#cc0000" opacity="0.25"/>
  <text x="150" y="380" text-anchor="middle" fill="#cc0000" font-family="serif" font-size="18" letter-spacing="2">HANNIBAL</text>
</svg>