  <path d="M120 65 Q115 45 125 38 Q130 35 128 55" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M140 60 Q138 40 145 35" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M160 60 Q162 40 158 35" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M175 62 Q180 42 172 38" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M188 70 Q195 50 185 42" stroke="#e8e0d0" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Green-tinted skin -->
