  <path d="M125 128 Q135 135 150 132 Q165 135 175 128" stroke="#cc0000" stroke-width="2.5" fill="none"/>
  <!-- Vomit/bile -->
  <path d="M145 135 Q140 160 135 180 Q132 190 138 195" stroke="#61dafb" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M150 134 Q148 165 150 185" stroke="#61dafb" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Neck - twisted -->
  <path d="M130 145 Q125 155 135 170" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M170 145 Q175 155 165 170" stroke="#e8e0d0" stroke-width="2" fill="none" opacity="0.3"/>
  <rect x="132" y="145" width="36" height="25" fill="#e8e0d0" opacity="0.25"/>
  <!-- Nightgown -->
  <path d="M110 175 Q100 230 90 340 L210 340 Q200 230 190 175 Z" fill="#e8e0d0" opacity="0.12"/>
  <!-- Nightgown details -->
  <path d="M120 185 Q150 180 180 185" stroke="#e8e0d0" stroke-width="1" fill="none" opacity="0.15"/>
