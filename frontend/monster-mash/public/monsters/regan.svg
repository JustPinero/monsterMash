  <line x1="150" y1="180" x2="150" y2="200" stroke="#e8e0d0" stroke-width="2" opacity="0.3"/>
  <line x1="143" y1="185" x2="157" y2="185" stroke="#e8e0d0" stroke-width="2" opacity="0.3"/>
