  <line x1="120" y1="105" x2="132" y2="115" stroke="#cc0000" stroke-width="2" opacity="0.5"/>
  <line x1="122" y1="108" x2="130" y2="118" stroke="#cc0000" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="102" x2="182" y2="112" stroke="#cc0000" stroke-width="2" opacity="0.5"/>
  <!-- Nose -->
  <path d="M148 100 L146 112 L150 114 L154 112 L152 100" fill="#e8e0d0" opacity="0.35"/>
