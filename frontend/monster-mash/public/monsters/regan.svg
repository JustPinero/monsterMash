  <rect x="70" y="305" width="160" height="8" rx="3" fill="#e8e0d0" opacity="0.08"/>
  <rect x="70" y="305" width="5" height="35" fill="#e8e0d0" opacity="0.08"/>
  <rect x="225" y="305" width="5" height="35" fill="#e8e0d0" opacity="0.08"/>
  <text x="150" y="380" text-anchor="middle" fill="#cc0000" font-family="serif" font-size="18" letter-spacing="2">REGAN</text>
