<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Moon -->
  <circle cx="230" cy="60" r="35" fill="#e8e0d0" opacity="0.3"/>
  <circle cx="240" cy="55" r="30" fill="#1a1c17"/>
  <!-- Fur/head shape -->
  <path d="M100 160 Q80 100 110 70 Q130 50 150 55 Q170 50 190 70 Q220 100 200 160 Q200 190 190 200 L110 200 Q100 190 100 160" fill="#e8e0d0" opacity="0.5"/>
  <!-- Pointed ears -->
  <polygon points="105,110 90,60 120,95" fill="#e8e0d0" opacity="0.6"/>
  <polygon points="195,110 210,60 180,95" fill="#e8e0d0" opacity="0.6"/>
  <!-- Inner ears -->
  <polygon points="107,105 97,72 118,97" fill="#cc0000" opacity="0.4"/>
  <polygon points="193,105 203,72 182,97" fill="#cc0000" opacity="0.4"/>
  <!-- Eyes -->
  <ellipse cx="130" cy="120" rx="10" ry="7" fill="#cc0000"/>
  <ellipse cx="170" cy="120" rx="10" ry="7" fill="#cc0000"/>
  <ellipse cx="130" cy="120" rx="5" ry="5" fill="#1a1c17"/>
  <ellipse cx="170" cy="120" rx="5" ry="5" fill="#1a1c17"/>
  <!-- Snout -->
  <ellipse cx="150" cy="160" rx="25" ry="18" fill="#e8e0d0" opacity="0.7"/>
  <ellipse cx="150" cy="152" rx="12" ry="8" fill="#1a1c17"/>
  <!-- Fangs -->
  <polygon points="138,170 142,185 146,170" fill="#e8e0d0"/>
  <polygon points="154,170 158,185 162,170" fill="#e8e0d0"/>
  <!-- Howling mouth -->
  <path d="M130 168 Q150 180 170 168" stroke="#cc0000" stroke-width="2" fill="#cc0000" opacity="0.5"/>
  <!-- Body with fur texture -->
  <path d="M110 200 Q90 250 85 320 L215 320 Q210 250 190 200 Z" fill="#e8e0d0" opacity="0.3"/>
  <!-- Fur lines -->
  <line x1="120" y1="210" x2="115" y2="230" stroke="#e8e0d0" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="210" x2="138" y2="235" stroke="#e8e0d0" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="210" x2="162" y2="235" stroke="#e8e0d0" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="210" x2="185" y2="230" stroke="#e8e0d0" stroke-width="1" opacity="0.4"/>
  <!-- Claws -->
  <path d="M85 310 L70 330 L78 325 L68 340 L80 330 L75 345 L90 320" fill="#e8e0d0" opacity="0.5"/>
  <path d="M215 310 L230 330 L222 325 L232 340 L220 330 L225 345 L210 320" fill="#e8e0d0" opacity="0.5"/>
  <text x="150" y="380" text-anchor="middle" fill="#e8e0d0" font-family="serif" font-size="18" letter-spacing="2">WOLFMAN</text>
</svg>