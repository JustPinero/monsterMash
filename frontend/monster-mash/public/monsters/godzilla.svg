<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Cityscape silhouette in background -->
  <rect x="30" y="280" width="25" height="60" fill="#e8e0d0" opacity="0.1"/>
  <rect x="60" y="260" width="20" height="80" fill="#e8e0d0" opacity="0.1"/>
  <rect x="220" y="270" width="22" height="70" fill="#e8e0d0" opacity="0.1"/>
  <rect x="248" y="255" width="18" height="85" fill="#e8e0d0" opacity="0.1"/>
  <!-- Tail -->
  <path d="M80 300 Q50 280 30 250 Q20 230 25 210" stroke="#cc0000" stroke-width="12" fill="none" opacity="0.6"/>
  <path d="M25 210 L20 200" stroke="#cc0000" stroke-width="8" fill="none" opacity="0.5"/>
  <!-- Body -->
  <path d="M100 180 Q90 220 85 280 Q85 310 100 330 L200 330 Q215 310 215 280 Q210 220 200 180 Z" fill="#cc0000" opacity="0.5"/>
  <!-- Back spines -->
  <polygon points="140,170 148,130 156,170" fill="#e8e0d0" opacity="0.6"/>
  <polygon points="150,155 156,120 162,155" fill="#e8e0d0" opacity="0.55"/>
  <polygon points="160,150 165,118 170,150" fill="#e8e0d0" opacity="0.5"/>
  <polygon points="128,178 135,145 142,178" fill="#e8e0d0" opacity="0.55"/>
  <polygon points="170,160 174,132 178,160" fill="#e8e0d0" opacity="0.45"/>
  <!-- Neck -->
  <path d="M130 180 Q125 140 130 110 Q135 90 145 80 L165 80 Q175 90 178 110 Q180 140 175 180" fill="#cc0000" opacity="0.55"/>
  <!-- Head -->
  <path d="M120 90 Q115 70 130 55 Q140 48 155 48 Q175 50 185 65 Q190 80 180 95 Q170 100 150 100 Q130 100 120 90" fill="#cc0000" opacity="0.6"/>
  <!-- Jaw -->
  <path d="M120 90 Q130 100 135 105 L175 105 Q180 100 185 90" fill="#cc0000" opacity="0.55"/>
  <!-- Teeth -->
  <path d="M130 95 L133 102 L136 95 L139 102 L142 95 L145 102 L148 95" stroke="#e8e0d0" stroke-width="1.5" fill="none"/>
  <path d="M160 95 L163 102 L166 95 L169 102 L172 95 L175 102" stroke="#e8e0d0" stroke-width="1.5" fill="none"/>
  <!-- Eye -->
  <circle cx="145" cy="72" r="6" fill="#1a1c17"/>
  <circle cx="145" cy="72" r="3" fill="#cc0000"/>
  <!-- Atomic breath glow -->
  <path d="M130 100 Q110 110 90 130 Q80 140 75 150" stroke="#61dafb" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M130 100 Q105 115 85 140" stroke="#61dafb" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Arms -->
  <path d="M105 210 L80 230 L75 225 M80 230 L73 235" stroke="#cc0000" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M195 210 L220 230 L225 225 M220 230 L227 235" stroke="#cc0000" stroke-width="4" fill="none" opacity="0.5"/>
  <!-- Legs -->
  <rect x="110" y="320" width="25" height="25" rx="3" fill="#cc0000" opacity="0.5"/>
  <rect x="165" y="320" width="25" height="25" rx="3" fill="#cc0000" opacity="0.5"/>
  <text x="150" y="380" text-anchor="middle" fill="#61dafb" font-family="serif" font-size="18" font-weight="bold" letter-spacing="2">GODZILLA</text>
</svg>