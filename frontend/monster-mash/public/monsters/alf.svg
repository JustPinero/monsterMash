<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Fur body base -->
  <path d="M100 180 Q85 230 80 310 L220 310 Q215 230 200 180 Z" fill="#e8e0d0" opacity="0.3"/>
  <!-- Head - elongated snout shape -->
  <path d="M110 80 Q105 70 115 55 Q130 40 150 38 Q170 40 185 55 Q195 70 190 80 Q192 120 185 150 Q175 165 150 170 Q125 165 115 150 Q108 120 110 80" fill="#e8e0d0" opacity="0.45"/>
  <!-- Fur texture on head -->
  <path d="M115 60 Q112 55 115 50" stroke="#e8e0d0" stroke-width="1.5" opacity="0.3"/>
  <path d="M185 60 Q188 55 185 50" stroke="#e8e0d0" stroke-width="1.5" opacity="0.3"/>
  <!-- Large nose/snout -->
  <ellipse cx="150" cy="120" rx="22" ry="18" fill="#e8e0d0" opacity="0.6"/>
  <ellipse cx="150" cy="112" rx="10" ry="7" fill="#1a1c17"/>
  <!-- Eyes - friendly but alien -->
  <ellipse cx="132" cy="88" rx="10" ry="9" fill="#e8e0d0" opacity="0.7"/>
  <circle cx="132" cy="88" r="5" fill="#1a1c17"/>
  <circle cx="130" cy="86" r="2" fill="#e8e0d0"/>
  <ellipse cx="168" cy="88" rx="10" ry="9" fill="#e8e0d0" opacity="0.7"/>
  <circle cx="168" cy="88" r="5" fill="#1a1c17"/>
  <circle cx="166" cy="86" r="2" fill="#e8e0d0"/>
  <!-- Big ears -->
  <ellipse cx="98" cy="80" rx="15" ry="22" fill="#e8e0d0" opacity="0.4" transform="rotate(-15 98 80)"/>
  <ellipse cx="98" cy="80" rx="8" ry="14" fill="#cc0000" opacity="0.2" transform="rotate(-15 98 80)"/>
  <ellipse cx="202" cy="80" rx="15" ry="22" fill="#e8e0d0" opacity="0.4" transform="rotate(15 202 80)"/>
  <ellipse cx="202" cy="80" rx="8" ry="14" fill="#cc0000" opacity="0.2" transform="rotate(15 202 80)"/>
  <!-- Mouth - wide grin -->
  <path d="M128 140 Q150 155 172 140" stroke="#1a1c17" stroke-width="2" fill="none"/>
  <!-- Teeth showing -->
  <rect x="140" y="142" width="5" height="5" fill="#e8e0d0" opacity="0.6"/>
  <rect x="148" y="141" width="5" height="6" fill="#e8e0d0" opacity="0.6"/>
  <rect x="156" y="142" width="5" height="5" fill="#e8e0d0" opacity="0.6"/>
  <!-- Fur on body -->
  <path d="M100 190 Q97 195 100 200" stroke="#e8e0d0" stroke-width="1" opacity="0.2"/>
  <path d="M200 190 Q203 195 200 200" stroke="#e8e0d0" stroke-width="1" opacity="0.2"/>
  <path d="M110 220 Q107 225 110 230" stroke="#e8e0d0" stroke-width="1" opacity="0.2"/>
  <path d="M190 220 Q193 225 190 230" stroke="#e8e0d0" stroke-width="1" opacity="0.2"/>
  <!-- Hawaiian shirt (over fur) -->
  <path d="M108 190 L100 310 L200 310 L192 190 Z" fill="#cc0000" opacity="0.15"/>
  <!-- Shirt pattern - flowers -->
  <circle cx="130" cy="220" r="5" fill="#e8e0d0" opacity="0.1"/>
  <circle cx="160" cy="240" r="5" fill="#e8e0d0" opacity="0.1"/>
  <circle cx="140" cy="270" r="5" fill="#e8e0d0" opacity="0.1"/>
  <circle cx="170" cy="280" r="5" fill="#e8e0d0" opacity="0.1"/>
  <!-- Collar -->
  <path d="M120 185 L150 200 L180 185" stroke="#cc0000" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Arms/hands -->
  <path d="M100 210 L70 240" stroke="#e8e0d0" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M200 210 L230 240" stroke="#e8e0d0" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Holding a cat silhouette in one hand (ha!) -->
  <path d="M225 235 Q235 230 240 235 Q245 240 240 250 Q235 260 230 258 Q225 255 225 245 Z" fill="#e8e0d0" opacity="0.15"/>
  <polygon points="228,232 225,222 230,230" fill="#e8e0d0" opacity="0.15"/>
  <polygon points="237,230 240,220 240,230" fill="#e8e0d0" opacity="0.15"/>
  <text x="150" y="380" text-anchor="middle" fill="#e8e0d0" font-family="sans-serif" font-size="22" font-weight="bold" letter-spacing="3">ALF</text>
</svg>