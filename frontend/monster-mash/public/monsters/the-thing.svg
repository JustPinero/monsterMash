  <path d="M100 280 L60 310 L55 305" stroke="#cc0000" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M110 290 L75 325 L70 320" stroke="#cc0000" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M200 280 L240 310 L245 305" stroke="#cc0000" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M190 290 L225 325 L230 320" stroke="#cc0000" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Goo drips -->
  <path d="M140 335 Q138 345 140 352" stroke="#cc0000" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="140" cy="354" r="2" fill="#cc0000" opacity="0.4"/>
