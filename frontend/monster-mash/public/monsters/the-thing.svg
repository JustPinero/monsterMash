  <circle cx="120" cy="170" r="4" fill="#1a1c17"/>
  <circle cx="120" cy="170" r="2" fill="#cc0000"/>
  <circle cx="180" cy="165" r="10" fill="#e8e0d0" opacity="0.5"/>
  <circle cx="180" cy="165" r="5" fill="#1a1c17"/>
  <circle cx="180" cy="165" r="2.5" fill="#cc0000"/>
  <circle cx="150" cy="190" r="6" fill="#e8e0d0" opacity="0.4"/>
  <circle cx="150" cy="190" r="3" fill="#1a1c17"/>
  <circle cx="150" cy="190" r="1.5" fill="#cc0000"/>
  <!-- Veiny texture -->
  <path d="M100 180 Q120 200 110 240" stroke="#cc0000" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M200 180 Q180 200 190 240" stroke="#cc0000" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M140 220 Q150 250 160 220" stroke="#cc0000" stroke-width="1" fill="none" opacity="0.4"/>
