<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#1a1c17"/>
  <!-- Flat top head -->
  <rect x="105" y="60" width="90" height="30" rx="3" fill="#e8e0d0" opacity="0.6"/>
  <rect x="100" y="80" width="100" height="80" rx="10" fill="#e8e0d0" opacity="0.5"/>
  <!-- Bolts -->
  <rect x="75" y="105" width="30" height="12" rx="6" fill="#cc0000"/>
  <rect x="195" y="105" width="30" height="12" rx="6" fill="#cc0000"/>
  <!-- Forehead stitches -->
  <line x1="120" y1="85" x2="180" y2="85" stroke="#cc0000" stroke-width="2"/>
  <line x1="130" y1="80" x2="130" y2="90" stroke="#cc0000" stroke-width="2"/>
  <line x1="150" y1="80" x2="150" y2="90" stroke="#cc0000" stroke-width="2"/>
  <line x1="170" y1="80" x2="170" y2="90" stroke="#cc0000" stroke-width="2"/>
  <!-- Eyes -->
  <rect x="120" y="100" width="18" height="12" rx="2" fill="#1a1c17"/>
  <rect x="162" y="100" width="18" height="12" rx="2" fill="#1a1c17"/>
  <circle cx="129" cy="106" r="4" fill="#cc0000"/>
  <circle cx="171" cy="106" r="4" fill="#cc0000"/>
  <!-- Mouth -->
  <line x1="125" y1="140" x2="175" y2="140" stroke="#1a1c17" stroke-width="3"/>
  <line x1="130" y1="136" x2="130" y2="144" stroke="#1a1c17" stroke-width="2"/>
  <line x1="145" y1="136" x2="145" y2="144" stroke="#1a1c17" stroke-width="2"/>
  <line x1="160" y1="136" x2="160" y2="144" stroke="#1a1c17" stroke-width="2"/>
  <!-- Body -->
  <rect x="100" y="170" width="100" height="140" rx="5" fill="#e8e0d0" opacity="0.3"/>
  <!-- Jacket -->
  <rect x="105" y="175" width="40" height="130" fill="#1a1c17" stroke="#e8e0d0" stroke-width="1" opacity="0.8"/>
  <rect x="155" y="175" width="40" height="130" fill="#1a1c17" stroke="#e8e0d0" stroke-width="1" opacity="0.8"/>
  <!-- Arms -->
  <rect x="65" y="180" width="35" height="15" rx="7" fill="#e8e0d0" opacity="0.4"/>
  <rect x="200" y="180" width="35" height="15" rx="7" fill="#e8e0d0" opacity="0.4"/>
  <text x="150" y="380" text-anchor="middle" fill="#e8e0d0" font-family="serif" font-size="16" letter-spacing="2">FRANKENSTEIN</text>
</svg>