  <line x1="127" y1="98" x2="124" y2="93" stroke="#1a1c17" stroke-width="1.5"/>
  <line x1="137" y1="98" x2="140" y2="93" stroke="#1a1c17" stroke-width="1.5"/>
  <line x1="158" y1="100" x2="155" y2="95" stroke="#1a1c17" stroke-width="1.5"/>
  <line x1="163" y1="98" x2="160" y2="93" stroke="#1a1c17" stroke-width="1.5"/>
  <line x1="178" y1="100" x2="181" y2="95" stroke="#1a1c17" stroke-width="1.5"/>
