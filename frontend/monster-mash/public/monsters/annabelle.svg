  <path d="M168 115 Q175 118 178 115" stroke="#1a1c17" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- White dress with collar -->
  <path d="M115 165 Q105 200 95 340 L205 340 Q195 200 185 165 Z" fill="#e8e0d0" opacity="0.15"/>
